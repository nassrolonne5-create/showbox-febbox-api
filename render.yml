services:
  - type: web
    name: showbox-api
    runtime: node
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: BYPASS_URL
        fromService:
          name: showbox-bypass
          type: pserv
          property: hostport

  - type: pserv
    name: showbox-bypass
    runtime: python
    rootDir: bypass
    buildCommand: |
      python3 -m venv venv
      source venv/bin/activate
      pip install -r requirements.txt
    startCommand: source venv/bin/activate && python server.py
